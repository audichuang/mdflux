# Build the offline Windows portable zip and publish a public GitHub Release.
# Release assets are downloadable without logging in (unlike Actions Artifacts).
name: Portable build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: portable-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-offline:
    name: Windows offline portable zip
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install frontend deps
        working-directory: app
        run: npm ci

      - name: Bundle offline runtime + build portable zip
        shell: pwsh
        run: pwsh -File scripts/make-portable.ps1

      - name: Locate zip + release metadata
        id: zip
        shell: pwsh
        run: |
          $zips = Get-ChildItem -Path dist -Filter "MDFlux_*_portable_offline.zip" -ErrorAction Stop
          if ($zips.Count -lt 1) { throw "No portable_offline zip found in dist/" }
          $zip = $zips | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $mb = [math]::Round($zip.Length / 1MB, 2)
          Write-Host "Artifact: $($zip.FullName) ($mb MB)"

          $conf = Get-Content app/src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $version = $conf.version
          $sha = $env:GITHUB_SHA.Substring(0, 7)

          if ($env:GITHUB_REF -like "refs/tags/*") {
            $tag = $env:GITHUB_REF_NAME
            $title = "MDFlux $tag — offline portable (Windows)"
          } else {
            # Rolling public release: always the same tag so the download URL stays stable.
            $tag = "offline-latest"
            $title = "MDFlux $version — offline portable (Windows)"
          }

          "path=$($zip.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "name=$($zip.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "mb=$mb" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "sha=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "title=$title" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.name }}
          path: ${{ steps.zip.outputs.path }}
          if-no-files-found: error
          retention-days: 14

      # Public download (no login). Main/workflow_dispatch → tag offline-latest (rolling).
      # Tag push v* → versioned release under that tag.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.zip.outputs.tag }}
          name: ${{ steps.zip.outputs.title }}
          target_commitish: ${{ github.sha }}
          files: ${{ steps.zip.outputs.path }}
          fail_on_unmatched_files: true
          make_latest: true
          draft: false
          prerelease: false
          body: |
            ## Offline portable (Windows x64)

            Unzip and run `MDFlux.exe`. **No first-launch Python download.**

            | | |
            |---|---|
            | File | `${{ steps.zip.outputs.name }}` (~${{ steps.zip.outputs.mb }} MB) |
            | App version | `${{ steps.zip.outputs.version }}` |
            | Commit | `${{ steps.zip.outputs.sha }}` |
            | Built | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |

            ### Included
            - GUI (existing Tauri + Svelte app)
            - Bundled Python 3.12 + core conversion packages (MarkItDown stack)

            ### Not included
            - OCR engine
            - Audio transcription engine

            ### Notes
            - Unsigned build: Windows SmartScreen may warn — More info → Run anyway
            - Needs WebView2 (ships with current Windows 10/11)

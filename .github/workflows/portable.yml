# Build offline Windows packages and publish a public GitHub Release.
# Primary: NSIS Setup.exe (real installer). Optional: portable zip.
# Release assets are downloadable without logging in.
name: Portable build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: portable-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-offline:
    name: Windows offline installer
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install frontend deps
        working-directory: app
        run: npm ci

      - name: Build NSIS installer (+ portable zip)
        shell: pwsh
        run: pwsh -File scripts/make-installer.ps1 -AlsoPortable

      - name: Locate packages + release metadata
        id: pkg
        shell: pwsh
        run: |
          $setup = Get-ChildItem -Path dist -Filter "MDFlux_*_x64-setup.exe" -ErrorAction Stop |
            Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $zip = Get-ChildItem -Path dist -Filter "MDFlux_*_portable_offline.zip" -ErrorAction SilentlyContinue |
            Sort-Object LastWriteTime -Descending | Select-Object -First 1

          if (-not $setup) { throw "Setup.exe not found in dist/" }

          $setupMb = [math]::Round($setup.Length / 1MB, 2)
          Write-Host "Installer: $($setup.FullName) ($setupMb MB)"

          $files = @($setup.FullName)
          if ($zip) {
            $zipMb = [math]::Round($zip.Length / 1MB, 2)
            Write-Host "Portable:  $($zip.FullName) ($zipMb MB)"
            $files += $zip.FullName
            "zip_name=$($zip.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            "zip_mb=$zipMb" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          }

          $conf = Get-Content app/src-tauri/tauri.conf.json -Raw | ConvertFrom-Json
          $version = $conf.version
          $sha = $env:GITHUB_SHA.Substring(0, 7)

          if ($env:GITHUB_REF -like "refs/tags/*") {
            $tag = $env:GITHUB_REF_NAME
            $title = "MDFlux $tag — Windows installer"
          } else {
            $tag = "offline-latest"
            $title = "MDFlux $version — Windows installer (offline)"
          }

          # softprops accepts multiline files via newline-separated list in some versions;
          # pass space-joined and also individual paths for upload-artifact.
          "setup_path=$($setup.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "setup_name=$($setup.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "setup_mb=$setupMb" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "files=$($files -join `n)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "sha=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "title=$title" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MDFlux-windows-offline
          path: |
            dist/MDFlux_*_x64-setup.exe
            dist/MDFlux_*_portable_offline.zip
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg.outputs.tag }}
          name: ${{ steps.pkg.outputs.title }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/MDFlux_*_x64-setup.exe
            dist/MDFlux_*_portable_offline.zip
          fail_on_unmatched_files: true
          make_latest: true
          draft: false
          prerelease: false
          body: |
            ## Windows installer (offline) — recommended

            1. Download **`${{ steps.pkg.outputs.setup_name }}`**
            2. Run the installer (current user, **no admin**)
            3. Open **MDFlux** from the Start Menu

            No unzip. No first-launch Python download.

            | | |
            |---|---|
            | **Installer (recommended)** | `${{ steps.pkg.outputs.setup_name }}` (~${{ steps.pkg.outputs.setup_mb }} MB) |
            | Portable zip (optional) | `MDFlux_*_portable_offline.zip` (unzip & run) |
            | Install mode | Current user |
            | App version | `${{ steps.pkg.outputs.version }}` |
            | Commit | `${{ steps.pkg.outputs.sha }}` |
            | Built | ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} |

            ### Included
            - Desktop app + Start Menu shortcut
            - Bundled Python 3.12 + MarkItDown core conversion stack

            ### Not included
            - OCR engine
            - Audio transcription engine

            ### Notes
            - Unsigned: SmartScreen may warn — More info → Run anyway
            - WebView2 is required (bootstrapper can download it if missing)

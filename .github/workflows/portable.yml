# Build the offline Windows portable zip (MDFlux.exe + bundled Python runtime).
# - Artifact: Actions run → Artifacts → MDFlux_*_portable_offline.zip
# - Tag push (v*): also attaches the zip to a GitHub Release
name: Portable build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: portable-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-offline:
    name: Windows offline portable zip
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install frontend deps
        working-directory: app
        run: npm ci

      - name: Bundle offline runtime + build portable zip
        shell: pwsh
        run: pwsh -File scripts/make-portable.ps1

      - name: Locate zip
        id: zip
        shell: pwsh
        run: |
          $zips = Get-ChildItem -Path dist -Filter "MDFlux_*_portable_offline.zip" -ErrorAction Stop
          if ($zips.Count -lt 1) { throw "No portable_offline zip found in dist/" }
          $zip = $zips | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          $mb = [math]::Round($zip.Length / 1MB, 2)
          Write-Host "Artifact: $($zip.FullName) ($mb MB)"
          "path=$($zip.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "name=$($zip.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.name }}
          path: ${{ steps.zip.outputs.path }}
          if-no-files-found: error
          retention-days: 30

      - name: Attach zip to GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.path }}
          fail_on_unmatched_files: true
          generate_release_notes: true
